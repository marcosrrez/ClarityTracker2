<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e7eb;
    }
    
    .logo {
      width: 24px;
      height: 24px;
      background: #3b82f6;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 12px;
    }
    
    .title {
      font-weight: 600;
      color: #111827;
    }
    
    .subtitle {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 16px;
    }
    
    .capture-btn {
      width: 100%;
      padding: 12px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 8px;
    }
    
    .capture-btn:hover {
      background: #2563eb;
    }
    
    .capture-btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    
    .selection-btn {
      width: 100%;
      padding: 10px;
      background: white;
      color: #374151;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 12px;
    }
    
    .selection-btn:hover {
      border-color: #3b82f6;
      background: #f8fafc;
    }
    
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
      margin-top: 8px;
    }
    
    .status.success {
      background: #dcfce7;
      color: #166534;
    }
    
    .status.error {
      background: #fef2f2;
      color: #dc2626;
    }
    
    .status.loading {
      background: #dbeafe;
      color: #1d4ed8;
    }
    
    .settings-link {
      text-align: center;
      margin-top: 12px;
    }
    
    .settings-link a {
      color: #6b7280;
      text-decoration: none;
      font-size: 12px;
    }
    
    .settings-link a:hover {
      color: #3b82f6;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">C</div>
    <div>
      <div class="title">ClarityLog</div>
    </div>
  </div>
  
  <div class="subtitle">Capture content for professional development</div>
  
  <button id="captureArticle" class="capture-btn">
    📄 Capture Full Article
  </button>
  
  <button id="captureSelection" class="selection-btn">
    ✂️ Capture Selected Text
  </button>
  
  <div id="status" class="status" style="display: none;"></div>
  
  <div class="settings-link">
    <a href="#" id="openSettings">Extension Settings</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
